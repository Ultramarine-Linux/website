    "schema-version": "1.10.0",
    "install": {
      "bun": {
        "pkg-path": "bun"
      },
      "nodejs": {
        "pkg-path": "nodejs"
      }
    },
    "hook": {
      "on-activate": "\n  bun i\n  echo \"\"\n  echo \"run 'flox services start dev' to start the dev server at localhost:4321\"\n  echo \"\"\n  echo \"run 'flox services start dev-host' to start the dev server and expose to the LAN/Tailnet at hostname:4321\"\n  echo \"\"\n  echo \"Contact Jaiden for help with Flox @ Fyra\"\n  echo \"\"\n  echo \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "dev": {
        "command": "bun dev"
      },
      "dev-host": {
        "command": "bun dev --host"
      }
    }
  },
